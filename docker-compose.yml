version: '3.8'

services:
  # Banco de dados
  postgres:
    image: postgres:16
    container_name: korp_postgres
    environment:
      POSTGRES_USER: korp
      POSTGRES_PASSWORD: korp123
      POSTGRES_DB: korp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U korp"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Microsserviço de Estoque
  servico-estoque:
    build: ./servico-estoque/ServicoEstoque
    container_name: korp_estoque
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=korp_db;Username=korp;Password=korp123
      - ASPNETCORE_URLS=http://+:8081
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  # Microsserviço de Faturamento
  servico-faturamento:
    build: ./servico-faturamento/ServicoFaturamento
    container_name: korp_faturamento
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=korp_db;Username=korp;Password=korp123
      - ASPNETCORE_URLS=http://+:8082
      - ASPNETCORE_ENVIRONMENT=Development
      - EstoqueServiceUrl=http://servico-estoque:8081
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      servico-estoque:
        condition: service_started

volumes:
  postgres_data: